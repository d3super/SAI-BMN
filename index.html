<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensus BMN - Form Petugas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="pb-12">

  <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
    <div class="max-w-md mx-auto flex items-center">
      <i class="ph ph-scan text-2xl mr-2"></i>
      <h1 class="text-xl font-semibold">SAI BMN Sensus</h1>
    </div>
  </header>

  <main class="max-w-md mx-auto mt-4 px-4">
    <!-- Tabs -->
    <div class="flex border-b border-gray-200 mb-6">
      <button id="tabNUP" class="w-1/2 py-3 text-center tab-active transition" onclick="switchTab('nup')">Data BMN NUP</button>
      <button id="tabNonNUP" class="w-1/2 py-3 text-center text-gray-500 transition" onclick="switchTab('nonnup')">Data NON NUP</button>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed top-20 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-4 py-2 rounded shadow-lg transition-opacity duration-300 z-50 text-sm">
      Berhasil disimpan!
    </div>

    <!-- FORM NUP -->
    <form id="formNup" class="space-y-4">
      <input type="hidden" name="action" value="submitNUP">
      
      <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Kode Barang</label>
          <input type="text" name="kdBarang" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:border-blue-500 focus:ring focus:ring-blue-200 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">NUP</label>
          <div class="flex space-x-2">
            <input type="text" name="nup" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:border-blue-500 focus:ring outline-none">
            <button type="button" onclick="autoFillNup()" class="bg-blue-100 text-blue-700 px-3 rounded font-medium hover:bg-blue-200 text-sm flex items-center">
              <i class="ph ph-magnifying-glass mr-1"></i> Cek
            </button>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nama Barang</label>
          <input type="text" name="nmBarang" class="w-full border-gray-300 rounded-md shadow-sm p-2 border bg-gray-50 outline-none">
        </div>
      </div>

      <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 space-y-4">
         <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Kondisi</label>
          <select name="kondisi" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border outline-none bg-white">
            <option value="Baik">Baik</option>
            <option value="Rusak Ringan">Rusak Ringan</option>
            <option value="Rusak Berat">Rusak Berat</option>
            <option value="Hilang">Hilang</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Lokasi Ruang</label>
          <input type="text" name="lokRuang" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border outline-none">
        </div>
      </div>

      <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Foto Fisik</label>
          <input type="file" accept="image/*" capture="environment" id="fotoNup" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nama Petugas</label>
          <input type="text" name="nmPetugas" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border outline-none">
        </div>
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg shadow hover:bg-blue-700 flex justify-center items-center">
        <span class="btn-text">Kirim Data</span>
        <div class="loader hidden ml-2"></div>
      </button>
    </form>

    <!-- FORM NON NUP -->
    <form id="formNonNup" class="space-y-4 hidden">
      <input type="hidden" name="action" value="submitNonNUP">
      <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nama Barang</label>
          <input type="text" name="nmBarang" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:border-blue-500 focus:ring outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Merk/Tipe</label>
          <input type="text" name="merk" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:border-blue-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Kondisi</label>
          <select name="kondisi" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border outline-none bg-white">
            <option value="Baik">Baik</option>
            <option value="Rusak Ringan">Rusak Ringan</option>
            <option value="Rusak Berat">Rusak Berat</option>
            <option value="Hilang">Hilang</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Lokasi Ruang</label>
          <input type="text" name="lokRuang" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border outline-none">
        </div>
      </div>

       <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Foto Fisik</label>
          <input type="file" accept="image/*" capture="environment" id="fotoNonNup" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nama Petugas</label>
          <input type="text" name="nmPetugas" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border outline-none">
        </div>
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg shadow hover:bg-blue-700 flex justify-center items-center">
        <span class="btn-text">Kirim Data</span>
        <div class="loader hidden ml-2"></div>
      </button>
    </form>

  </main>

  <script>
    // --- CONFIGURATION ---
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx3eKLP3sxt-CWv8BbwqlkNRqBgDZvib_Z4kKDUkM9nWQnfx9gJiD_bMkchj4fvMbfy/exec"; 

    // --- UI LOGIC ---
    function switchTab(tab) {
      document.getElementById('formNup').classList.toggle('hidden', tab !== 'nup');
      document.getElementById('formNonNup').classList.toggle('hidden', tab !== 'nonnup');
      
      document.getElementById('tabNUP').className = tab === 'nup' ? 'w-1/2 py-3 text-center tab-active transition' : 'w-1/2 py-3 text-center text-gray-500 transition';
      document.getElementById('tabNonNUP').className = tab === 'nonnup' ? 'w-1/2 py-3 text-center tab-active transition' : 'w-1/2 py-3 text-center text-gray-500 transition';
    }

    function showToast() {
      const t = document.getElementById('toast');
      t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    // --- API & DATA LOGIC ---
    async function autoFillNup() {
      const form = document.getElementById('formNup');
      const kdBarang = form.kdBarang.value;
      const nup = form.nup.value;
      if(!kdBarang || !nup) return alert("Isi Kode Barang dan NUP");

      try {
        // Fetch API logic here (Requires CORS handled in GAS)
        const res = await fetch(`${GAS_WEB_APP_URL}?api=getBMNInfo&kdBarang=${kdBarang}&nup=${nup}`);
        const result = await res.json();
        if(result.success) {
           form.nmBarang.value = result.data.nmBarang;
        }
      } catch (err) {
        console.error("Auto-fill fail (expected if testing locally without setup):", err);
      }
    }

    // Image Compression utility
    function compressImage(file, callback) {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = event => {
        const img = new Image();
        img.src = event.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          
          const MAX_WIDTH = 800;
          let width = img.width;
          let height = img.height;
          
          if (width > MAX_WIDTH) {
            height *= MAX_WIDTH / width;
            width = MAX_WIDTH;
          }
          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          
          callback(canvas.toDataURL('image/jpeg', 0.6));
        }
      }
    }

    async function handleFormSubmit(e, formId, fileInputId) {
      e.preventDefault();
      const form = document.getElementById(formId);
      const btnText = form.querySelector('.btn-text');
      const loader = form.querySelector('.loader');
      const fileInput = document.getElementById(fileInputId);
      
      btnText.innerText = "Mengunggah...";
      loader.classList.remove('hidden');
      form.querySelector('button[type="submit"]').disabled = true;

      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());

      const file = fileInput.files[0];
      if (file) {
        compressImage(file, async (base64) => {
          payload.fotoBase64 = base64;
          await sendDataToGAS(payload, form);
        });
      } else {
        await sendDataToGAS(payload, form);
      }
    }

    async function sendDataToGAS(payload, form) {
      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' } // text/plain circumvents strict CORS preflight
        });
        
        const result = await response.json();
        if(result.success) {
           showToast();
           form.reset();
        } else {
           alert("Gagal: " + result.message);
        }
      } catch (error) {
        alert("Terjadi kesalahan jaringan.");
      } finally {
        const btnText = form.querySelector('.btn-text');
        const loader = form.querySelector('.loader');
        btnText.innerText = "Kirim Data";
        loader.classList.add('hidden');
        form.querySelector('button[type="submit"]').disabled = false;
      }
    }

    document.getElementById('formNup').addEventListener('submit', (e) => handleFormSubmit(e, 'formNup', 'fotoNup'));
    document.getElementById('formNonNup').addEventListener('submit', (e) => handleFormSubmit(e, 'formNonNup', 'fotoNonNup'));

  </script>
</body>
</html>
