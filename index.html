<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensus BMN - Form Petugas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="pb-12">

  <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
    <div class="max-w-md mx-auto flex items-center">
      <i class="ph ph-scan text-2xl mr-2"></i>
      <h1 class="text-xl font-semibold">SAI BMN Sensus</h1>
    </div>
  </header>

  <main class="max-w-md mx-auto mt-4 px-4">
    <!-- Tabs -->
    <div class="flex border-b border-gray-200 mb-6">
      <button id="tabNUP" class="w-1/2 py-3 text-center tab-active transition" onclick="switchTab('nup')">Data BMN NUP</button>
      <button id="tabNonNUP" class="w-1/2 py-3 text-center text-gray-500 transition" onclick="switchTab('nonnup')">Data NON NUP</button>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed top-20 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-4 py-2 rounded shadow-lg transition-opacity duration-300 z-50 text-sm">
      Berhasil disimpan!
    </div>

    <!-- FORM NUP -->
    <form id="formNup" class="space-y-4">
      <input type="hidden" name="action" value="submitNUP">
      
      <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Kode Barang</label>
          <input type="text" name="kdBarang" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:border-blue-500 focus:ring focus:ring-blue-200 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">NUP</label>
          <div class="flex space-x-2">
            <input type="text" name="nup" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:border-blue-500 focus:ring outline-none">
            <button type="button" onclick="autoFillNup()" class="bg-blue-100 text-blue-700 px-3 rounded font-medium hover:bg-blue-200 text-sm flex items-center">
              <i class="ph ph-magnifying-glass mr-1"></i> Cek
            </button>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nama Barang</label>
          <input type="text" name="nmBarang" class="w-full border-gray-300 rounded-md shadow-sm p-2 border bg-gray-50 outline-none">
        </div>
      </div>

      <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 space-y-4">
         <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Kondisi</label>
          <select name="kondisi" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border outline-none bg-white">
            <option value="Baik">Baik</option>
            <option value="Rusak Ringan">Rusak Ringan</option>
            <option value="Rusak Berat">Rusak Berat</option>
            <option value="Hilang">Hilang</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Lokasi Ruang</label>
          <input type="text" name="lokRuang" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border outline-none">
        </div>
      </div>

      <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Foto Fisik</label>
          <div class="flex flex-col space-y-3">
            <!-- Tombol untuk buka kamera (Menggantikan input file) -->
            <button type="button" onclick="openCamera('Nup')" class="bg-gray-50 border border-gray-300 text-gray-700 py-3 px-4 rounded-md flex items-center justify-center hover:bg-gray-100 transition font-medium">
              <i class="ph ph-camera text-xl mr-2"></i> Buka Kamera
            </button>
            <!-- Preview Foto -->
            <img id="previewNup" src="" class="hidden w-full h-auto rounded-md border border-gray-200 shadow-sm object-cover">
            <!-- Hidden input untuk menampung base64 foto -->
            <input type="hidden" id="fotoDataNup" name="fotoBase64">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nama Petugas</label>
          <input type="text" name="nmPetugas" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border outline-none">
        </div>
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg shadow hover:bg-blue-700 flex justify-center items-center">
        <span class="btn-text">Kirim Data</span>
        <div class="loader hidden ml-2"></div>
      </button>
    </form>

    <!-- FORM NON NUP -->
    <form id="formNonNup" class="space-y-4 hidden">
      <input type="hidden" name="action" value="submitNonNUP">
      <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nama Barang</label>
          <input type="text" name="nmBarang" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:border-blue-500 focus:ring outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Merk/Tipe</label>
          <input type="text" name="merk" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:border-blue-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Kondisi</label>
          <select name="kondisi" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border outline-none bg-white">
            <option value="Baik">Baik</option>
            <option value="Rusak Ringan">Rusak Ringan</option>
            <option value="Rusak Berat">Rusak Berat</option>
            <option value="Hilang">Hilang</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Lokasi Ruang</label>
          <input type="text" name="lokRuang" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border outline-none">
        </div>
      </div>

       <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Foto Fisik</label>
          <div class="flex flex-col space-y-3">
            <button type="button" onclick="openCamera('NonNup')" class="bg-gray-50 border border-gray-300 text-gray-700 py-3 px-4 rounded-md flex items-center justify-center hover:bg-gray-100 transition font-medium">
              <i class="ph ph-camera text-xl mr-2"></i> Buka Kamera
            </button>
            <img id="previewNonNup" src="" class="hidden w-full h-auto rounded-md border border-gray-200 shadow-sm object-cover">
            <input type="hidden" id="fotoDataNonNup" name="fotoBase64">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nama Petugas</label>
          <input type="text" name="nmPetugas" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border outline-none">
        </div>
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg shadow hover:bg-blue-700 flex justify-center items-center">
        <span class="btn-text">Kirim Data</span>
        <div class="loader hidden ml-2"></div>
      </button>
    </form>

  </main>

  <!-- MODAL KAMERA -->
  <div id="cameraModal" class="hidden fixed inset-0 bg-black z-[100] flex flex-col">
    <div class="flex justify-between items-center p-4 text-white bg-black/50 absolute top-0 left-0 right-0 z-10">
      <h2 class="text-lg font-semibold">Kamera Aktif</h2>
      <button type="button" onclick="closeCamera()" class="p-2 bg-gray-800 rounded-full hover:bg-gray-700">
        <i class="ph ph-x text-xl"></i>
      </button>
    </div>
    
    <div class="flex-1 relative bg-black flex items-center justify-center overflow-hidden">
      <video id="videoStream" autoplay playsinline class="w-full h-full object-cover"></video>
    </div>
    
    <div class="p-6 bg-black flex justify-center pb-12">
      <!-- Tombol Shutter -->
      <button type="button" onclick="capturePhoto()" class="w-16 h-16 bg-white rounded-full border-4 border-gray-400 flex items-center justify-center shadow-[0_0_15px_rgba(255,255,255,0.3)] active:scale-95 active:bg-gray-200 transition">
      </button>
    </div>
    <!-- Canvas disembunyikan, hanya digunakan untuk memproses frame video menjadi gambar -->
    <canvas id="cameraCanvas" class="hidden"></canvas>
  </div>

  <script>
    // --- CONFIGURATION ---
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx3eKLP3sxt-CWv8BbwqlkNRqBgDZvib_Z4kKDUkM9nWQnfx9gJiD_bMkchj4fvMbfy/exec"; 

    // --- UI LOGIC ---
    function switchTab(tab) {
      document.getElementById('formNup').classList.toggle('hidden', tab !== 'nup');
      document.getElementById('formNonNup').classList.toggle('hidden', tab !== 'nonnup');
      
      document.getElementById('tabNUP').className = tab === 'nup' ? 'w-1/2 py-3 text-center tab-active transition' : 'w-1/2 py-3 text-center text-gray-500 transition';
      document.getElementById('tabNonNUP').className = tab === 'nonnup' ? 'w-1/2 py-3 text-center tab-active transition' : 'w-1/2 py-3 text-center text-gray-500 transition';
    }

    function showToast() {
      const t = document.getElementById('toast');
      t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    // --- API LOGIC (Auto Fill) ---
    async function autoFillNup() {
      const form = document.getElementById('formNup');
      const kdBarang = form.kdBarang.value;
      const nup = form.nup.value;
      if(!kdBarang || !nup) return alert("Isi Kode Barang dan NUP terlebih dahulu");

      try {
        const res = await fetch(`${GAS_WEB_APP_URL}?api=getBMNInfo&kdBarang=${kdBarang}&nup=${nup}`);
        const result = await res.json();
        
        if(result.success) {
           form.nmBarang.value = result.data.nmBarang;
        } else {
           alert(result.message);
           form.nmBarang.value = "";
        }
      } catch (err) {
        console.error("Auto-fill fail:", err);
        alert("Gagal menghubungi server database.");
      }
    }

    // --- CAMERA LOGIC (WebRTC) ---
    let currentCameraTarget = '';
    let videoStream = null;

    function openCamera(target) {
      currentCameraTarget = target;
      const modal = document.getElementById('cameraModal');
      const video = document.getElementById('videoStream');
      
      modal.classList.remove('hidden');

      // Meminta akses kamera (Kamera belakang jika tersedia pada HP)
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => {
          videoStream = stream;
          video.srcObject = stream;
        })
        .catch(err => {
          console.error("Gagal akses kamera:", err);
          alert("Gagal mengakses kamera. Pastikan browser Anda memiliki izin kamera.");
          closeCamera();
        });
    }

    function closeCamera() {
      const modal = document.getElementById('cameraModal');
      modal.classList.add('hidden');
      
      // Matikan stream kamera saat modal ditutup
      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
        videoStream = null;
      }
    }

    function capturePhoto() {
      const video = document.getElementById('videoStream');
      const canvas = document.getElementById('cameraCanvas');
      const ctx = canvas.getContext('2d');
      
      // Setup ukuran kompresi gambar (maksimal 800px)
      const MAX_WIDTH = 800;
      let width = video.videoWidth;
      let height = video.videoHeight;
      
      if (width > MAX_WIDTH) {
        height *= MAX_WIDTH / width;
        width = MAX_WIDTH;
      }
      
      canvas.width = width;
      canvas.height = height;
      
      // Gambar frame saat ini ke canvas
      ctx.drawImage(video, 0, 0, width, height);
      
      // Konversi canvas ke base64 (JPEG, quality 0.6 untuk kompresi ukuran file)
      const dataURL = canvas.toDataURL('image/jpeg', 0.6);
      
      // Tampilkan preview di form
      const previewImg = document.getElementById('preview' + currentCameraTarget);
      previewImg.src = dataURL;
      previewImg.classList.remove('hidden');
      
      // Simpan data base64 ke input hidden
      document.getElementById('fotoData' + currentCameraTarget).value = dataURL;
      
      closeCamera();
    }

    // --- FORM SUBMIT LOGIC ---
    async function handleFormSubmit(e, formId) {
      e.preventDefault();
      const form = document.getElementById(formId);
      const btnText = form.querySelector('.btn-text');
      const loader = form.querySelector('.loader');
      
      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());

      // Validasi manual apakah foto sudah diambil
      if (!payload.fotoBase64) {
         alert("Silakan ambil foto fisik terlebih dahulu melalui tombol Kamera!");
         return;
      }

      btnText.innerText = "Mengunggah...";
      loader.classList.remove('hidden');
      form.querySelector('button[type="submit"]').disabled = true;

      await sendDataToGAS(payload, form);
    }

    async function sendDataToGAS(payload, form) {
      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        
        const result = await response.json();
        if(result.success) {
           showToast();
           form.reset();
           // Sembunyikan dan hapus preview foto dari UI
           document.getElementById('previewNup').classList.add('hidden');
           document.getElementById('previewNup').src = "";
           document.getElementById('fotoDataNup').value = "";
           document.getElementById('previewNonNup').classList.add('hidden');
           document.getElementById('previewNonNup').src = "";
           document.getElementById('fotoDataNonNup').value = "";
        } else {
           alert("Gagal: " + result.message);
        }
      } catch (error) {
        alert("Terjadi kesalahan jaringan.");
      } finally {
        const btnText = form.querySelector('.btn-text');
        const loader = form.querySelector('.loader');
        btnText.innerText = "Kirim Data";
        loader.classList.add('hidden');
        form.querySelector('button[type="submit"]').disabled = false;
      }
    }

    // Pasang Event Listener pada Form Submit
    document.getElementById('formNup').addEventListener('submit', (e) => handleFormSubmit(e, 'formNup'));
    document.getElementById('formNonNup').addEventListener('submit', (e) => handleFormSubmit(e, 'formNonNup'));

  </script>
</body>
</html>
