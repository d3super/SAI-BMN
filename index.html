<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body class="bg-gray-100 p-4">
  <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6">
    <h2 class="text-xl font-bold mb-4 text-blue-600">Sensus BMN - Audit Lokasi</h2>
    
    <div class="space-y-4">
      <div class="flex gap-2">
        <input id="kdBarang" placeholder="Kode Barang" class="border p-2 rounded w-full">
        <input id="nup" placeholder="NUP" class="border p-2 rounded w-full">
        <button onclick="searchBMN()" class="bg-blue-500 text-white px-4 py-2 rounded">Cari</button>
      </div>

      <form id="sensusForm" class="space-y-4">
        <input type="hidden" name="action" value="submitNUP">
        <div>
          <label class="text-xs font-bold text-gray-400">NAMA BARANG</label>
          <input id="nmBarang" readonly class="w-full bg-gray-50 p-2 rounded border-none">
        </div>

        <div class="grid grid-cols-1 gap-4">
          <div>
            <label class="text-xs font-bold text-red-400">LOKASI MASTER (DB)</label>
            <input id="lokMaster" readonly class="w-full bg-red-50 p-2 rounded border-none italic text-gray-500">
          </div>
          <div>
            <label class="text-sm font-bold text-gray-700">LOKASI FISIK SEKARANG *</label>
            <input name="lokRuangFisik" required placeholder="Gedung X, Ruang Y" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-400 outline-none">
          </div>
        </div>

        <div>
          <label class="text-sm font-bold">KONDISI</label>
          <select name="kondisi" class="w-full border p-2 rounded">
            <option>Baik</option><option>Rusak Ringan</option><option>Rusak Berat</option><option>Hilang</option>
          </select>
        </div>

        <input name="nmPetugas" placeholder="Nama Petugas" required class="w-full border p-2 rounded">
        <input type="file" id="foto" accept="image/*" class="w-full text-sm">
        <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg shadow-lg">KIRIM DATA SENSUS</button>
      </form>
    </div>
  </div>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx3eKLP3sxt-CWv8BbwqlkNRqBgDZvib_Z4kKDUkM9nWQnfx9gJiD_bMkchj4fvMbfy/exec';

    function searchBMN() {
      const kdB = document.getElementById('kdBarang').value;
      const nup = document.getElementById('nup').value;
      fetch(`${scriptURL}?api=getBMNInfo&kdBarang=${kdB}&nup=${nup}`)
        .then(r => r.json()).then(res => {
          if(res.success) {
            document.getElementById('nmBarang').value = res.data.nmBarang;
            document.getElementById('lokMaster').value = res.data.lokMaster;
          } else { alert("BMN tidak ditemukan!"); }
        });
    }

    document.getElementById('sensusForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true; btn.innerText = "Mengirim...";

      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      data.kdBarang = document.getElementById('kdBarang').value;
      data.nup = document.getElementById('nup').value;

      const file = document.getElementById('foto').files[0];
      if(file) {
        const reader = new FileReader();
        reader.onload = () => {
          data.fotoBase64 = reader.result;
          send(data);
        };
        reader.readAsDataURL(file);
      } else { send(data); }
    };

    function send(data) {
      fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) })
        .then(r => r.json()).then(res => {
          alert(res.message);
          location.reload();
        });
    }
  </script>
</body>
</html>
